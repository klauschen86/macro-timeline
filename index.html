<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="宏观日历">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="manifest.json">
<title>宏观数据时间轴 v1.01</title>
<style>
:root {
  --bg: #f8f9fb;
  --card: #ffffff;
  --text: #1a1a2e;
  --text2: #6b7280;
  --border: #e5e7eb;
  --shadow: 0 1px 3px rgba(0,0,0,0.05);
  --radius: 12px;
  --radius-sm: 8px;
  --cn: #D43030; --cn-light: #FEE2E2;
  --us: #2563EB; --us-light: #DBEAFE;
  --eu: #D97706; --eu-light: #FEF3C7;
  --jp: #DC2626; --jp-light: #FEE2E2;
  --uk: #1E40AF; --uk-light: #DBEAFE;
  --tab-height: 60px;
  --header-height: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; overflow: hidden; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); height: 100%;
  overflow: hidden; -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  user-select: none; -webkit-user-select: none;
}

.app { display: flex; flex-direction: column; height: 100%; }

/* ── Header ── */
.header {
  height: var(--header-height); background: var(--card); flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.header .update { font-size: 11px; color: var(--text2); }

/* ── Content Area ── */
.content { flex: 1; overflow: hidden; position: relative; }

.page {
  position: absolute; inset: 0; overflow-y: auto; overflow-x: hidden;
  display: none; -webkit-overflow-scrolling: touch;
  padding: 12px 12px calc(var(--tab-height) + var(--safe-bottom) + 16px);
  scroll-behavior: smooth;
}
.page.active { display: block; }

/* ── Bottom Tabs ── */
.tabs {
  height: var(--tab-height); flex-shrink: 0; background: var(--card);
  display: flex; border-top: 1px solid var(--border);
  position: sticky; bottom: 0; z-index: 100;
  padding-bottom: var(--safe-bottom);
}
.tab {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 2px; cursor: pointer;
  color: var(--text2); font-size: 10px; font-weight: 500;
  transition: color 0.15s; border: none; background: none;
  -webkit-tap-highlight-color: transparent;
}
.tab .icon { font-size: 22px; line-height: 1; }
.tab.active { color: var(--text); font-weight: 700; }
.tab.active .icon { transform: scale(1.1); }
.tab .badge {
  position: absolute; top: 4px; margin-left: 14px;
  font-size: 9px; background: #EF4444; color: #fff;
  border-radius: 8px; padding: 0 5px; min-width: 16px; height: 16px;
  display: flex; align-items: center; justify-content: center;
}

/* ── Calendar Tab ── */
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.cal-header .month { font-size: 17px; font-weight: 700; }
.cal-nav { display: flex; gap: 4px; }
.cal-nav button {
  width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--card); font-size: 16px; cursor: pointer; color: var(--text);
  display: flex; align-items: center; justify-content: center;
}
.cal-legend { display: flex; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.cal-legend span { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 4px; }
.cal-legend .dot { width: 7px; height: 7px; border-radius: 50%; }

.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 1px; text-align: center;
}
.cal-grid .dow { font-size: 10px; color: var(--text2); padding: 6px 0; font-weight: 600; }
.cal-grid .dow.wk { color: #D43030; }
.cal-cell {
  aspect-ratio: 1; border-radius: 10px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 500; position: relative;
  transition: background 0.12s;
  -webkit-tap-highlight-color: transparent;
}
.cal-cell:active { background: #e5e7eb; }
.cal-cell.other { color: #ccc; pointer-events: none; }
.cal-cell.today { background: #EEF2FF; font-weight: 700; box-shadow: inset 0 0 0 2px #6366f1; }
.cal-dots { display: flex; gap: 1.5px; margin-top: 1px; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; }

.cal-day-list { margin-top: 14px; }
.cal-day-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text2); }

/* ── Timeline Tab ── */
.filter-row {
  display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap;
}
.chip {
  padding: 6px 14px; border-radius: 18px; border: 1px solid var(--border);
  font-size: 12px; cursor: pointer; background: var(--card);
  font-weight: 500; transition: all 0.15s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.chip:active { transform: scale(0.96); }
.chip.on { color: #fff; border-color: transparent; }
.chip.cn.on { background: var(--cn); } .chip.us.on { background: var(--us); }
.chip.eu.on { background: var(--eu); } .chip.jp.on { background: var(--jp); }
.chip.uk.on { background: var(--uk); }
.chip.all.on { background: #1a1a2e; }
.chip.imp.on { background: #F59E0B; }

.date-bar {
  font-size: 12px; color: var(--text2); font-weight: 600;
  padding: 8px 0 4px;
}

.ev-card {
  background: var(--card); border-radius: var(--radius);
  padding: 14px; margin-bottom: 8px;
  box-shadow: var(--shadow); border: 1px solid var(--border);
  cursor: pointer; transition: transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.ev-card:active { transform: scale(0.985); }
.ev-card.past { opacity: 0.6; }
.ev-card.today-ev { border-left: 3px solid #6366f1; }

.ev-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.ev-flag {
  font-size: 10px; padding: 1px 6px; border-radius: 3px;
  font-weight: 600; color: #fff;
}
.ev-flag.CN { background: var(--cn); } .ev-flag.US { background: var(--us); }
.ev-flag.EU { background: var(--eu); } .ev-flag.JP { background: var(--jp); }
.ev-flag.UK { background: var(--uk); }

.ev-title { font-size: 15px; font-weight: 600; flex: 1; }
.ev-stars { font-size: 11px; letter-spacing: 1px; }
.ev-stars .on { color: #F59E0B; } .ev-stars .off { color: #d1d5db; }

.ev-meta { font-size: 11px; color: var(--text2); display: flex; gap: 8px; flex-wrap: wrap; }
.ev-result {
  margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap;
}
.ev-val {
  font-size: 12px; padding: 3px 8px; border-radius: 5px;
  font-weight: 600; font-variant-numeric: tabular-nums;
}
.ev-val.act { background: #ECFDF5; color: #059669; }
.ev-val.fc { background: #FEF3C7; color: #B45309; }
.ev-val.pv { background: #F3F4F6; color: #6B7280; }

.ev-badge {
  font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 600;
}
.ev-badge.up { background: #EEF2FF; color: #4F46E5; }
.ev-badge.done { background: #ECFDF5; color: #059669; }

/* ── Stats Tab ── */
.stats-grid { display: grid; gap: 10px; }
.stat-card {
  background: var(--card); border-radius: var(--radius);
  padding: 16px; box-shadow: var(--shadow); border: 1px solid var(--border);
}
.stat-card .label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .val { font-size: 32px; font-weight: 700; margin: 4px 0; }
.stat-card .sub { font-size: 12px; color: var(--text2); }

.stat-highlight { border-left: 3px solid #6366f1; }

/* ── Sheet (bottom modal) ── */
.sheet-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 200;
  display: none; align-items: flex-end;
}
.sheet-overlay.show { display: flex; }
.sheet {
  background: var(--card); border-radius: 16px 16px 0 0;
  width: 100%; max-height: 70vh; overflow-y: auto;
  padding: 20px; padding-bottom: calc(20px + var(--safe-bottom));
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px; background: #d1d5db;
  margin: 0 auto 16px;
}
.sheet h3 { font-size: 17px; font-weight: 700; margin-bottom: 16px; }
.sheet .field { margin-bottom: 12px; }
.sheet .field label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; display: block; }
.sheet .field .v { font-size: 15px; font-weight: 500; margin-top: 2px; }

.sheet-results {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 14px 0;
}
.sheet-res {
  background: #f9fafb; border-radius: 8px; padding: 12px; text-align: center;
}
.sheet-res .l { font-size: 10px; color: var(--text2); }
.sheet-res .n { font-size: 18px; font-weight: 700; margin-top: 2px; }

/* ── Empty State ── */
.empty { text-align: center; padding: 40px 20px; color: var(--text2); }
.empty .icon { font-size: 36px; margin-bottom: 8px; }

/* ── Desktop overrides ── */
@media (min-width: 768px) {
  body { overflow: auto; }
  .app { max-width: 480px; margin: 0 auto; height: 100vh; box-shadow: -1px 0 20px rgba(0,0,0,0.08), 1px 0 20px rgba(0,0,0,0.08); }
  .content { overflow-y: auto; }
  .page { position: static; padding-bottom: calc(var(--tab-height) + 20px); }
  .sheet { border-radius: 16px; max-width: 480px; margin: 0 auto; }
}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <h1>📊 宏观时间轴</h1>
    <span class="update" id="updateTime">加载中...</span>
  </div>

  <!-- Content Pages -->
  <div class="content">
    <!-- Calendar -->
    <div class="page active" id="page-calendar">
      <div class="cal-header">
        <span class="month" id="calMonth"></span>
        <div class="cal-nav">
          <button onclick="navCal(-1)">◀</button>
          <button onclick="navCal(0)" style="width:auto;padding:0 10px;font-size:11px;border-radius:12px;">今天</button>
          <button onclick="navCal(1)">▶</button>
        </div>
      </div>
      <div class="cal-legend">
        <span><span class="dot" style="background:var(--cn)"></span>中国</span>
        <span><span class="dot" style="background:var(--us)"></span>美国</span>
        <span><span class="dot" style="background:var(--eu)"></span>欧元区</span>
        <span><span class="dot" style="background:var(--jp)"></span>日本</span>
        <span><span class="dot" style="background:var(--uk)"></span>英国</span>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- Timeline -->
    <div class="page" id="page-timeline">
      <div class="filter-row" id="countryFilter"></div>
      <div id="evList"></div>
    </div>

    <!-- Stats -->
    <div class="page" id="page-stats">
      <div class="stats-grid" id="statsGrid"></div>
      <div style="margin-top:16px;">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px;">📈 近期已发布</div>
        <div id="recentList"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Tabs -->
  <div class="tabs">
    <button class="tab active" data-page="calendar" onclick="switchTab('calendar')">
      <span class="icon">📅</span>日历
    </button>
    <button class="tab" data-page="timeline" onclick="switchTab('timeline')">
      <span class="icon">📋</span>时间轴
      <span class="badge" id="todayBadge" style="display:none">0</span>
    </button>
    <button class="tab" data-page="stats" onclick="switchTab('stats')">
      <span class="icon">📊</span>统计
    </button>
  </div>
</div>

<!-- Detail Sheet -->
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <h3 id="sheetTitle"></h3>
    <div id="sheetBody"></div>
  </div>
</div>

<script src="data/calendar_data.js"></script>
<script>
// ── State ──
let events = [], currentMonth = new Date(), activeTab = 'calendar';
let filter = { country: 'all' };

const CC = { CN: '#D43030', US: '#2563EB', EU: '#D97706', JP: '#DC2626', UK: '#1E40AF' };
const MO = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const DOW = ['一','二','三','四','五','六','日'];
const today = new Date().toISOString().slice(0,10);

// ── Init ──
function init() {
  if (window.CALENDAR_DATA?.events) {
    events = window.CALENDAR_DATA.events;
    document.getElementById('updateTime').textContent =
      '更新 ' + (window.CALENDAR_DATA.meta?.generated_at || '').slice(5,10);
  }
  buildFilters();
  switchTab('calendar');
  regSW();
}

function regSW() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

// ── Tabs ──
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelector(`.tab[data-page="${tab}"]`).classList.add('active');
  if (tab === 'calendar') renderCalendar();
  if (tab === 'timeline') renderTimeline();
  if (tab === 'stats') renderStats();
  updateTodayBadge();
}

// ── Today Badge ──
function updateTodayBadge() {
  const badge = document.getElementById('todayBadge');
  const todayEvents = events.filter(e => e.release_date === today);
  if (todayEvents.length) {
    badge.style.display = 'flex'; badge.textContent = todayEvents.length;
  } else { badge.style.display = 'none'; }
}

// ── Calendar ──
function renderCalendar() {
  const y = currentMonth.getFullYear(), m = currentMonth.getMonth();
  document.getElementById('calMonth').textContent = y + '年 ' + MO[m];

  const em = {};
  events.forEach(e => {
    const d = e.release_date;
    if (!em[d]) em[d] = [];
    em[d].push(e);
  });

  let html = '';
  DOW.forEach((d, i) => {
    html += `<div class="dow${i >= 5 ? ' wk' : ''}">${d}</div>`;
  });

  const fd = new Date(y, m, 1).getDay() || 7;
  const ld = new Date(y, m + 1, 0).getDate();
  const pd = new Date(y, m, 0).getDate();

  for (let i = fd - 2; i >= 0; i--) {
    const d = pd - i;
    html += `<div class="cal-cell other">${d}</div>`;
  }
  for (let d = 1; d <= ld; d++) {
    const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = ds === today;
    const dayEvents = em[ds] || [];
    const countries = [...new Set(dayEvents.map(e => e.country))];
    let dots = '';
    if (countries.length) {
      dots = '<div class="cal-dots">' +
        countries.slice(0,5).map(c => `<div class="cal-dot" style="background:${CC[c]||'#999'}"></div>`).join('') +
        '</div>';
    }
    html += `<div class="cal-cell${isToday ? ' today' : ''}" data-date="${ds}" onclick="onCalDay('${ds}')">${d}${dots}</div>`;
  }
  const total = Math.ceil((fd - 1 + ld) / 7) * 7;
  for (let d = 1, i = fd - 1 + ld; i < total; i++, d++) {
    html += `<div class="cal-cell other">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

function navCal(d) {
  if (d === 0) currentMonth = new Date();
  else currentMonth.setMonth(currentMonth.getMonth() + d);
  renderCalendar();
}

function onCalDay(ds) {
  switchTab('timeline');
  filter.country = 'all';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  document.querySelector('.chip.all')?.classList.add('on');
  setTimeout(() => {
    renderTimeline();
    const el = document.querySelector(`.ev-card[data-date="${ds}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

// ── Timeline ──
function buildFilters() {
  const ct = ['all','CN','US','EU','JP','UK'];
  const names = {all:'全部',CN:'中国',US:'美国',EU:'欧元区',JP:'日本',UK:'英国'};
  document.getElementById('countryFilter').innerHTML = ct.map(c =>
    `<span class="chip ${c} ${c==='all'?'on':''}" data-c="${c}" onclick="setFilter('${c}',this)">${names[c]}</span>`
  ).join('');
}

function setFilter(c, el) {
  filter.country = c;
  document.querySelectorAll('#countryFilter .chip').forEach(ch => ch.classList.remove('on'));
  el.classList.add('on');
  renderTimeline();
}

function renderTimeline() {
  let list = events;
  if (filter.country !== 'all') list = list.filter(e => e.country === filter.country);
  list.sort((a, b) => a.release_date.localeCompare(b.release_date));

  const el = document.getElementById('evList');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><div class="icon">📭</div><div>没有匹配的事件</div></div>';
    return;
  }

  const upcoming = list.filter(e => e.release_date >= today);
  const past = list.filter(e => e.release_date < today).reverse();

  let html = '';
  let lastDate = '';
  const renderGroup = (items, label) => {
    if (!items.length) return;
    html += `<div class="date-bar">${label} (${items.length})</div>`;
    items.forEach(e => {
      if (e.release_date !== lastDate) {
        lastDate = e.release_date;
        const dd = new Date(e.release_date + 'T00:00:00');
        const gap = Math.ceil((dd - new Date(today + 'T00:00:00')) / 86400000);
        let extra = '';
        if (gap === 0) extra = ' · <b style="color:#6366f1">今天</b>';
        else if (gap === 1) extra = ' · <b style="color:#6366f1">明天</b>';
        else if (gap <= 3) extra = ` · ${gap}天后`;
        html += `<div class="date-bar">${e.release_date.slice(5)} ${['周日','周一','周二','周三','周四','周五','周六'][dd.getDay()]}${extra}</div>`;
      }
      html += renderEvCard(e);
    });
  };

  renderGroup(upcoming, '📌 即将发布');
  renderGroup(past, '📜 近期已发布');

  el.innerHTML = html;
}

function renderEvCard(e) {
  const isPast = e.release_date < today;
  const isTodayE = e.release_date === today;
  const c = CC[e.country] || '#999';
  let stars = '<span class="ev-stars">';
  for (let i = 1; i <= 3; i++) stars += `<span class="${i <= (e.importance||1) ? 'on' : 'off'}">★</span>`;
  stars += '</span>';

  let result = '';
  const hasAct = e.actual !== null && e.actual !== undefined;
  if (hasAct) {
    result = '<div class="ev-result">';
    result += `<span class="ev-val act">实际 ${fmt(e.actual)}${e.unit||''}</span>`;
    if (e.forecast != null) result += `<span class="ev-val fc">预期 ${fmt(e.forecast)}${e.unit||''}</span>`;
    if (e.previous != null) result += `<span class="ev-val pv">前值 ${fmt(e.previous)}${e.unit||''}</span>`;
    result += '</div>';
  } else if (e.forecast != null) {
    result = '<div class="ev-result">';
    result += `<span class="ev-val fc">预期 ${fmt(e.forecast)}${e.unit||''}</span>`;
    if (e.previous != null) result += `<span class="ev-val pv">前值 ${fmt(e.previous)}${e.unit||''}</span>`;
    result += '</div>';
  }

  let badge = '';
  if (hasAct) badge = '<span class="ev-badge done">已发布</span>';
  else if (isTodayE) badge = '<span class="ev-badge up">今天</span>';

  return `
  <div class="ev-card ${isPast ? 'past' : ''} ${isTodayE ? 'today-ev' : ''}" data-date="${e.release_date}" onclick='openSheet(${JSON.stringify(e).replace(/'/g,"&#39;")})'>
    <div class="ev-top">
      <span class="ev-flag ${e.country}">${e.country_name}</span>
      <span class="ev-title">${e.indicator}</span>
      ${stars}
      ${badge}
    </div>
    <div class="ev-meta">
      <span>🕐 ${e.release_time||''}</span>
      <span>📋 ${e.period||''}</span>
      <span>📡 ${e.source||''}</span>
    </div>
    ${result}
  </div>`;
}

function fmt(v) { return typeof v === 'number' ? v.toFixed(2) : String(v); }

// ── Stats ──
function renderStats() {
  const todayE = events.filter(e => e.release_date === today);
  const weekEnd = (() => { const d = new Date(); d.setDate(d.getDate() + (7 - (d.getDay()||7))); return d.toISOString().slice(0,10); })();
  const monthEnd = (() => { const d=new Date(); d.setMonth(d.getMonth()+1,0); return d.toISOString().slice(0,10); })();
  const weekE = events.filter(e => e.release_date >= today && e.release_date <= weekEnd);
  const monthE = events.filter(e => e.release_date >= today && e.release_date <= monthEnd);
  const impE = monthE.filter(e => e.importance === 3);
  const released = events.filter(e => e.actual != null);
  const maxDate = events.length ? events[events.length-1].release_date : '--';

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card stat-highlight">
      <div class="label">📌 今日发布</div>
      <div class="val">${todayE.length}</div>
      <div class="sub">${todayE.map(e=>e.indicator).slice(0,2).join('、')||'暂无'}</div>
    </div>
    <div class="stat-card">
      <div class="label">📅 本周剩余</div>
      <div class="val">${weekE.length}</div>
      <div class="sub">至 ${weekEnd.slice(5)}</div>
    </div>
    <div class="stat-card">
      <div class="label">🗓 本月关注</div>
      <div class="val">${monthE.length}</div>
      <div class="sub">含 ${impE.length} 个高重要性事件</div>
    </div>
    <div class="stat-card">
      <div class="label">📊 总览</div>
      <div class="val">${events.length}</div>
      <div class="sub">${released.length} 已发布 | 覆盖至 ${maxDate.slice(0,7)}</div>
    </div>
  `;

  // Recent released
  const recent = events.filter(e => e.actual != null).slice(-8).reverse();
  document.getElementById('recentList').innerHTML = recent.map(e => renderEvCard(e)).join('');
}

// ── Detail Sheet ──
function openSheet(e) {
  const c = CC[e.country] || '#999';
  const has = e.actual != null;
  document.getElementById('sheetTitle').innerHTML =
    `<span class="ev-flag ${e.country}" style="margin-right:6px;">${e.country_name}</span>${e.indicator}`;

  document.getElementById('sheetBody').innerHTML = `
    <div class="field"><label>发布日期</label><div class="v">${e.release_date} ${e.release_time||''} (${e.timezone||''})</div></div>
    <div class="field"><label>数据期间</label><div class="v">${e.period||'--'} · ${e.frequency||''}</div></div>
    <div class="field"><label>数据来源</label><div class="v">${e.source||'--'}</div></div>
    <div class="field"><label>重要性</label><div class="v">${'★'.repeat(e.importance||0)}${'☆'.repeat(3-(e.importance||0))}</div></div>
    ${(has || e.forecast != null || e.previous != null) ? `
    <div class="sheet-results">
      <div class="sheet-res"><div class="l">实际值</div><div class="n" style="color:${has?'#059669':'#999'}">${has ? fmt(e.actual)+(e.unit||'') : '待发布'}</div></div>
      <div class="sheet-res"><div class="l">预期值</div><div class="n" style="color:${e.forecast!=null?'#B45309':'#999'}">${e.forecast!=null ? fmt(e.forecast)+(e.unit||'') : '--'}</div></div>
      <div class="sheet-res"><div class="l">前值</div><div class="n" style="color:${e.previous!=null?'#6B7280':'#999'}">${e.previous!=null ? fmt(e.previous)+(e.unit||'') : '--'}</div></div>
    </div>
    ` : ''}
    ${e.indicator_en ? `<div class="field"><label>英文名称</label><div class="v" style="color:var(--text2);font-size:13px;">${e.indicator_en}</div></div>` : ''}
  `;

  document.getElementById('sheetOverlay').classList.add('show');
}

function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('show');
}

// ── Touch Gestures ──
let touchX = 0, touchY = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; touchY = e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e => {
  if (document.getElementById('sheetOverlay').classList.contains('show')) return;
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 60) {
    if (activeTab === 'calendar') navCal(dx > 0 ? -1 : 1);
  }
}, {passive:true});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeSheet();
  if (activeTab === 'calendar' && !document.getElementById('sheetOverlay').classList.contains('show')) {
    if (e.key === 'ArrowLeft') navCal(-1);
    if (e.key === 'ArrowRight') navCal(1);
  }
});

// Boot
init();
</script>
</body>
</html>
