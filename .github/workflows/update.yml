name: 每日数据更新

on:
  schedule:
    # 北京时间每天早上 9:30 (UTC+8 = 01:30 UTC)
    - cron: '30 1 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: 运行数据更新
        run: python scripts/run_daily.py
      
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/calendar.json data/calendar_data.js
          git diff --staged --quiet || git commit -m "自动更新: $(date +'%Y-%m-%d')"
          git push
